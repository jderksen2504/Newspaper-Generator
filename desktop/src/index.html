<!DOCTYPE html>
<html lang="de" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newspaper Generator — D&D Setting</title>
  <!-- Schriften sind self-hosted via @font-face in styles.css (keine externen Requests, CSP-konform) -->
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app">
    <header class="toolbar">
      <div class="toolbar-title">
        <h1>Newspaper Generator</h1>
        <p>D&D Setting — Industrialisierungszeit</p>
      </div>
      <div class="toolbar-actions">
        <select id="lang-select" class="btn btn-ghost" style="font-size:12px; padding:4px 8px;" title="Language / Sprache">
          <option value="de">Deutsch</option>
          <option value="en">English</option>
        </select>
        <button id="btn-load" class="btn btn-ghost">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <span id="btn-load-label">Laden</span>
        </button>
        <button id="btn-save" class="btn btn-ghost">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          <span id="btn-save-label">Sichern</span>
        </button>
        <button id="btn-export" class="btn btn-primary">
          <svg id="export-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <span id="export-label">PNG Export</span>
        </button>
        <button id="btn-pdf" class="btn btn-ghost">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
          <span id="pdf-label">PDF Export</span>
        </button>
        <select id="pdf-compression" class="btn btn-ghost" style="font-size:12px; padding:4px 8px;" title="PDF-Kompression">
          <option value="lossless">Verlustfrei</option>
          <option value="high" selected>Hohe Qualität</option>
          <option value="medium">Mittel</option>
          <option value="low">Niedrig</option>
        </select>
      </div>
    </header>

    <main class="layout">
      <aside class="panel panel-left">
        <div id="settings-panel"></div>
      </aside>

      <section class="panel panel-center">
        <div class="preview-header">
          <h2>Vorschau</h2>
          <span class="hint">Live-Render — exakt wie der PNG-Export</span>
        </div>
        <div id="preview-container"></div>
      </section>

      <aside class="panel panel-right">
        <div id="article-list"></div>
      </aside>
    </main>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
